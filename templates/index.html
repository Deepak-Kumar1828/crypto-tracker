<!DOCTYPE html>
<html>
<head>
    <title>Crypto Tracker</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #121212;
        color: #f0f0f0;
        max-width: 700px;
        margin: 40px auto;
        padding: 0 20px;
    }

    h1 {
        text-align: center;
        color: #4dabf7;
    }

    form {
         display: flex;
         justify-content: center;
         gap: 10px;
         margin-bottom: 30px;
    }

    input[type="text"] {
         padding: 10px;
         border-radius: 5px;
         border: none;
         width: 200px;
    }
    button {
         padding: 10px 15xp;
         background-color: #4dabf7;
         color: white;
         border: none;
         border-radius: 5px;
         cursor: pointer;
    }

    button:hover {
        background-color: #339af0;
    }

    ul {
        list-style: none;
        padding: 12px 16px;
        margin-bottom: 10px;
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    li a {
         text-decoration: none;
    }

    canvas {
         background-color: #1e1e1e;
         border-radius: 8px;
         padding: 15px;
         margin-top: 20px;
    }
</style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
     <h1>Crypto Tracker</h1>

     <form action="/add" method="POST">
         <input type="text" name="coin" placeholder="e.g. bitcoin" required>
         <button type="submit">Add Coin</button>
     </form>

     <ul>
         {% for coin, value in prices.items() %}
         <li>
             {{ coin }}: ${{ value.usd }}
             <a href="/remove/{{ coin }}">❌</a>
         </li>
         {% endfor %}
     </ul>
<canvas id="priceChart" width="400" height="200"></canvas>

<script>
    const labels = [{% for coin in prices %}"{{ coin }}",{% endfor %}];
    const data = [{% for coin, value in prices.items() %}{{ value.usd }},{% endfor %}];

    const ctx = document.getElementById('priceChart');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Price (USD)',
                data: data,
                backgroundColor: 'rgba(54, 162, 235, 0.6)'
            }]
        }
    });
</script>
</body>
</html>
